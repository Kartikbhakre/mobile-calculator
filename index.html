<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Calculator</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div id="outer">
        <div id="main">



            <div>
                <input type="text" placeholder="Enter value">
            </div>

            <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>/</button>
            </div>

            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>*</button>
            </div>

            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>+</button>
            </div>

            <div>
                <button>.</button>
                <button>0</button>
                <button>-</button>
                <button>%</button>
            </div>

            <div>
                <button>00</button>
                <button>clr</button>
                <button>del</button>
                <button id="ans">=</button>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
